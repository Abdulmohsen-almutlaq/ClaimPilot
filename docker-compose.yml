services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: claimpilot
      POSTGRES_PASSWORD: claimpilot
      POSTGRES_DB: claimpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claimpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mock_crm:
    build: ./mock_crm
    environment:
      CHAOS_MODE: ""
    ports:
      - "8001:8001"

  app:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://claimpilot:claimpilot@postgres:5432/claimpilot
      REDIS_URL: redis://redis:6379/0
      CRM_BASE_URL: http://mock_crm:8001
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock_crm:
        condition: service_started
    volumes:
      - ./backend/app:/app/app
      - ./configs:/configs:ro

  worker:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://claimpilot:claimpilot@postgres:5432/claimpilot
      REDIS_URL: redis://redis:6379/0
      CRM_BASE_URL: http://mock_crm:8001
    command: ["arq", "app.worker.WorkerSettings"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock_crm:
        condition: service_started
    volumes:
      - ./backend/app:/app/app
      - ./configs:/configs:ro

volumes:
  postgres_data:
