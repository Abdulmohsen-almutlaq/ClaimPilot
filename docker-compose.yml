services:
  postgres:
    # postgres 16 + the pgvector extension (required by migration 0002)
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: claimpilot
      POSTGRES_PASSWORD: claimpilot
      POSTGRES_DB: claimpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claimpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://claimpilot:claimpilot@postgres:5432/claimpilot
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./configs:/configs:ro

  worker:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://claimpilot:claimpilot@postgres:5432/claimpilot
      REDIS_URL: redis://redis:6379/0
    command: ["arq", "app.worker.WorkerSettings"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./configs:/configs:ro

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      app:
        condition: service_started

volumes:
  postgres_data:
