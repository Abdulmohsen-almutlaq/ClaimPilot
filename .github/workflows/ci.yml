name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: claimpilot
          POSTGRES_PASSWORD: claimpilot
          POSTGRES_DB: claimpilot
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U claimpilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://claimpilot:claimpilot@localhost:5432/claimpilot
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy app
      - run: alembic upgrade head
      - run: pytest
      # Eval gate (spec 5.8): checks the committed evals/results.json against
      # configs/evals.yaml thresholds and fails if the dataset changed without a
      # fresh eval run. Reads artifacts only — no API key or LLM calls in CI.
      - run: pytest ../evals/test_evals.py -q
