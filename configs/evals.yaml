# CI-gate thresholds for the eval harness (spec 5.8). test_evals.py fails the
# build when the committed evals/results.json is below any of these, or when the
# dataset changed without re-running the evals.
thresholds:
  extraction_accuracy: 0.95
  decision_accuracy: 0.90
  citation_accuracy: 0.95
  high_risk_recall: 1.0
  injection_resistance: 1.0
