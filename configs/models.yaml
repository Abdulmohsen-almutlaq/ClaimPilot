# Model selection, token budgets, and non-secret endpoint config for every LLM-calling
# node in the pipeline. API keys are secrets and stay in .env — never put them here.
# Swap `provider` (or a node's `provider` override) to move the whole app to a
# different backend, including a local OpenAI-compatible server, with no code changes.

provider: deepseek # anthropic | openai | deepseek | local

providers:
  anthropic:
    base_url: https://api.anthropic.com
    model: claude-sonnet-4-6
    fallback_model: claude-haiku-4-5-20251001

  openai:
    base_url: https://api.openai.com/v1
    model: gpt-4o-mini
    fallback_model: gpt-4o-mini

  deepseek:
    # OpenAI-compatible API; supports function calling (used for structured output).
    base_url: https://api.deepseek.com/v1
    model: deepseek-chat
    fallback_model: deepseek-chat

  local:
    # Any OpenAI-compatible server: Ollama (http://localhost:11434/v1), vLLM, LM Studio.
    base_url: http://localhost:11434/v1
    model: llama3.1
    fallback_model: llama3.1

defaults:
  temperature: 0.2
  timeout_seconds: 30
  max_retries: 3
  # Soft budget: crossing it downgrades remaining calls to the fallback model.
  # Hard limit (budget x multiplier): LLM calls stop and the case goes to a human.
  token_budget_per_case: 25000
  token_budget_hard_multiplier: 2

guardrails:
  # Redact emails/phones/SSNs/card numbers before claim text reaches the
  # embedding backend (and thus the vector store).
  pii_redaction: true

# Per-node overrides. Anything omitted falls back to `defaults` / the active provider.
nodes:
  intake:
    temperature: 0.0
  draft:
    temperature: 0.2
  qa:
    temperature: 0.0
    use_fallback_model: true # cheap model for the QA/judge pass, per spec 5.9

# Embeddings for RAG: one backend only — a Hugging Face sentence-transformer run
# locally via ONNX Runtime (open-source fastembed: no torch, no GPU, no API key).
# 384-dim, symmetric (no query prefix), multilingual: Arabic (and 50+ other
# language) queries retrieve the English clause corpus cross-lingually.
# NOTE: the pgvector column is vector(384); switching to a model with a different
# dimension requires a new migration, and any model switch requires re-ingesting
# the corpus (make seed) since stored vectors must come from the same model.
embeddings:
  model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  dim: 384

retrieval:
  # 6 of the ~8 clauses per category: an eval miss showed top_k 5 dropping the
  # commercial-use exclusion for a delivery-damage claim, producing a reject with
  # the wrong citation.
  top_k: 6
  min_similarity: 0.05 # results below this cosine similarity are discarded

# Active prompt version per node. Bump here (after adding a new prompts/*.vN.md file)
# to roll out a prompt change; the version is logged on every LLM call and audit row.
prompts:
  intake_extract: v3 # v3: Arabic/bilingual documents — canonical enum/date/digit output
  draft_decision: v3 # v3: reasoning written in the claim's language
  qa_review: v2 # v2: cross-language review (Arabic draft over English evidence is valid)
